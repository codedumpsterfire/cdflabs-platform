services:
  app:
    build . 
  ports:
    - "8081:8081"
  profiles:
    - app
  db:
    image: postgres:16
    container_name: cdfxlabs
    volumes:
       - ./postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: cdfxlabs_db
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
  spark-master:
    image: apache/spark:3.5.0 # This 'rolling tag' is more stable for local use
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"
      - "7077:7077"