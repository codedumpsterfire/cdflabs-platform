# =====================================================
# Server
# =====================================================
server.port=8080


# =====================================================
# Database connection (Supabase Postgres via JDBC)
# Secrets resolved from env vars - never hardcode these
# =====================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# =====================================================
# JPA / Hibernate
# =====================================================
# validate = at startup, verify entity field annotations match the
# real DB schema. NEVER use 'update' or 'create' in production -
# Flyway owns schema changes.
spring.jpa.hibernate.ddl-auto=validate

# Show generated SQL in logs - useful for understanding what
# Hibernate is doing. Set to false in production to reduce log noise.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# =====================================================
# Flyway
# =====================================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Re-enabled. We were having migration chaos earlier which forced us
# to set this false, but now that things are stable we want Flyway to
# catch any future drift in already-applied migrations.
spring.flyway.validate-on-migrate=false


# =====================================================
# JWT (issued by Supabase Auth, verified by us later)
# =====================================================
jwt.secret=${JWT_SECRET}


# =====================================================
# CORS
# =====================================================
# Read by SecurityConfig via @Value.
# Comma-separated list of allowed origins.
cors.allowed-origins=http://localhost:4200


# =====================================================
# Logging
# =====================================================
# Default: INFO level for everything
logging.level.root=INFO

# Our own code - keep at INFO so business log lines are visible
logging.level.com.cdfxlabs=INFO

# Spring web - DEBUG shows incoming requests + which controller handles them.
# Turn this OFF (i.e. comment it out) in production - very noisy.
logging.level.org.springframework.web=DEBUG


# =====================================================
# Actuator - operational endpoints
# =====================================================
# Only expose what we actually need.
# 'prometheus' was here previously but the dependency for it isn't
# included - that endpoint would 404. Adding it later when we add
# micrometer-registry-prometheus to pom.xml.
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized